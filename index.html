<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的股票儀表板 - 雲端同步版</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-4 text-center">股票投資組合</h1>
        
        <div class="bg-blue-50 p-4 rounded-lg mb-6 text-center">
            <p class="text-gray-600 text-sm">總市值 (TWD)</p>
            <p id="totalValue" class="text-3xl font-bold text-blue-600">$0</p>
        </div>

        <div class="space-y-3 mb-6">
            <input id="stockSymbol" type="text" placeholder="代號 (如 2330.TW)" class="w-full border p-2 rounded">
            <input id="stockShares" type="number" placeholder="股數" class="w-full border p-2 rounded">
            <input id="stockCost" type="number" placeholder="平均成本" class="w-full border p-2 rounded">
            <button onclick="handleAddStock()" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">新增股票</button>
        </div>

        <div id="stockList" class="space-y-3">
            </div>
    </div>

    <script>
        // 🛑 重要：請把下面這行換成你在 Render 看到的實際網址
        const API_BASE_URL = 'https://你的後端網址.onrender.com';

        let stocks = [];

        // 1. 從雲端讀取資料
        async function loadStocks() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/stocks`);
                stocks = await response.json();
                renderStocks();
            } catch (error) {
                console.error('讀取失敗:', error);
            }
        }

        // 2. 新增股票到雲端
        async function handleAddStock() {
            const symbol = document.getElementById('stockSymbol').value.toUpperCase();
            const shares = parseFloat(document.getElementById('stockShares').value);
            const avgCost = parseFloat(document.getElementById('stockCost').value);

            if (!symbol || !shares) return alert('請填寫完整資訊');

            const newStock = { id: Date.now().toString(), symbol, shares, avgCost };

            try {
                await fetch(`${API_BASE_URL}/api/stocks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newStock)
                });
                document.getElementById('stockSymbol').value = '';
                document.getElementById('stockShares').value = '';
                document.getElementById('stockCost').value = '';
                loadStocks(); // 重新整理清單
            } catch (error) {
                alert('新增失敗');
            }
        }

        // 3. 從雲端刪除股票
        async function deleteStock(id) {
            try {
                await fetch(`${API_BASE_URL}/api/stocks/${id}`, { method: 'DELETE' });
                loadStocks();
            } catch (error) {
                alert('刪除失敗');
            }
        }

        // 4. 顯示股票清單並計算價格
        async function renderStocks() {
            const listDiv = document.getElementById('stockList');
            listDiv.innerHTML = '<p class="text-center text-gray-400">讀取中...</p>';
            
            let totalTWD = 0;

            const html = await Promise.all(stocks.map(async (s) => {
                let currentPrice = 0;
                try {
                    const res = await fetch(`${API_BASE_URL}/api/quote/${s.symbol}`);
                    const data = await res.json();
                    currentPrice = data.price;
                } catch (e) { currentPrice = 0; }

                const value = currentPrice * s.shares;
                totalTWD += value;

                return `
                    <div class="flex justify-between items-center p-3 border rounded shadow-sm">
                        <div>
                            <p class="font-bold">${s.symbol}</p>
                            <p class="text-xs text-gray-500">${s.shares} 股 | 現價: ${currentPrice}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-blue-500">$${Math.round(value).toLocaleString()}</p>
                            <button onclick="deleteStock('${s.id}')" class="text-xs text-red-400">刪除</button>
                        </div>
                    </div>
                `;
            }));

            listDiv.innerHTML = html.join('') || '<p class="text-center text-gray-400">目前沒有股票</p>';
            document.getElementById('totalValue').innerText = `$${Math.round(totalTWD).toLocaleString()}`;
        }

        // 初始載入
        loadStocks();
    </script>
</body>
</html>
