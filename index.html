<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的股票儀表板 - 雲端同步版</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-4 text-center">股票投資組合</h1>
        
        <div class="bg-blue-50 p-4 rounded-lg mb-6 text-center">
            <p class="text-gray-600 text-sm">總市值 (TWD)</p>
            <p id="totalValue" class="text-3xl font-bold text-blue-600">$0</p>
        </div>

        <div class="space-y-3 mb-6">
            <input id="stockSymbol" type="text" placeholder="代號 (如 2330.TW)" class="w-full border p-2 rounded">
            <input id="stockShares" type="number" placeholder="股數" class="w-full border p-2 rounded">
            <input id="stockCost" type="number" placeholder="平均成本" class="w-full border p-2 rounded">
            <button onclick="handleAddStock()" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">新增股票</button>
        </div>

        <div id="stockList" class="space-y-3">
            </div>
    </div>

    <script>
       // 🛑 請記得換成你的 Render 實際網址
const API_BASE_URL = 'https://my-stock-server-snmd.onrender.com';

let stocks = [];

// 1. 從雲端讀取資料
async function loadStocks() {
    const listDiv = document.getElementById('stockList');
    listDiv.innerHTML = '<p class="text-center text-gray-400">連線雲端中...</p>';
    
    try {
        const response = await fetch(`${API_BASE_URL}/api/stocks`);
        stocks = await response.json();
        renderStocks();
    } catch (error) {
        listDiv.innerHTML = '<p class="text-center text-red-400">讀取失敗，請檢查後端網址</p>';
    }
}

// 2. 新增股票
async function handleAddStock() {
    const symbol = document.getElementById('stockSymbol').value.toUpperCase().trim();
    const shares = parseFloat(document.getElementById('stockShares').value);
    const avgCost = parseFloat(document.getElementById('stockCost').value);

    if (!symbol || isNaN(shares)) return alert('請輸入代號與股數');

    const newStock = { 
        id: Date.now().toString(), 
        symbol, 
        shares: shares || 0, 
        avgCost: avgCost || 0 
    };

    try {
        await fetch(`${API_BASE_URL}/api/stocks`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(newStock)
        });
        // 清空輸入框
        document.querySelectorAll('input').forEach(i => i.value = '');
        loadStocks(); 
    } catch (error) {
        alert('新增失敗');
    }
}

// 3. 刪除股票
async function deleteStock(id) {
    if(!confirm('確定要刪除嗎？')) return;
    try {
        await fetch(`${API_BASE_URL}/api/stocks/${id}`, { method: 'DELETE' });
        loadStocks();
    } catch (error) {
        alert('刪除失敗');
    }
}

// 4. 渲染畫面 (修正 $非數值 問題)
async function renderStocks() {
    const listDiv = document.getElementById('stockList');
    let totalTWD = 0;

    const htmlPromises = stocks.map(async (s) => {
        let currentPrice = 0;
        try {
            const res = await fetch(`${API_BASE_URL}/api/quote/${s.symbol}`);
            const data = await res.json();
            currentPrice = data.price || 0;
        } catch (e) {
            currentPrice = 0;
        }

        const value = currentPrice * s.shares;
        totalTWD += value;

        return `
            <div class="flex justify-between items-center p-4 bg-white border border-gray-100 rounded-lg shadow-sm mb-2">
                <div>
                    <p class="font-bold text-gray-800">${s.symbol}</p>
                    <p class="text-xs text-gray-500">${s.shares.toLocaleString()} 股 | 現價: ${currentPrice || '抓取中'}</p>
                </div>
                <div class="text-right">
                    <p class="font-bold text-blue-600">$${Math.round(value).toLocaleString()}</p>
                    <button onclick="deleteStock('${s.id}')" class="text-xs text-red-300 hover:text-red-500 transition">刪除</button>
                </div>
            </div>
        `;
    });

    const htmlArray = await Promise.all(htmlPromises);
    listDiv.innerHTML = htmlArray.join('') || '<p class="text-center text-gray-400 py-4">目前沒有股票，請新增資料</p>';
    
    // 更新總市值文字
    const totalEl = document.getElementById('totalValue');
    totalEl.innerText = `$${Math.round(totalTWD).toLocaleString()}`;
}

// 初始載入
loadStocks();

    </script>
</body>
</html>
